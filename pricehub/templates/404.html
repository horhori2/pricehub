<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없습니다</title>
<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#0a0c12; color:#dde2f0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif; }
  .box { text-align:center; padding:32px; }
  .code { font-size:64px; font-weight:800; color:#5b8def; letter-spacing:-1px; }
  .msg { margin:8px 0 28px; font-size:15px; color:#5a6080; }
  .links { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  a { color:#dde2f0; text-decoration:none; border:1px solid #20263a; border-radius:8px;
      padding:9px 18px; font-size:13px; font-weight:600; transition:border-color .15s,color .15s; }
  a:hover { border-color:#5b8def; color:#5b8def; }
</style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <div class="msg">요청하신 페이지를 찾을 수 없습니다.</div>
    <div class="links">
      <a href="/prices/">카드 가격 검색</a>
      <a href="/">관리자 홈</a>
    </div>
  </div>
</body>
</html>
