<!DOCTYPE html>
{% load static %}
{% load cache_bust %}
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카드 가격 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static_v 'dashboard/dashboard.css' %}">
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">🔍</span>
    <span class="logo-text">카드 가격 검색</span>
  </div>
</header>

<main>
  <div class="page-title" style="font-size:28px;font-weight:900;letter-spacing:-0.5px;margin-bottom:6px;">게임 선택</div>
  <div class="page-sub" style="margin-bottom:32px;">확인하고 싶은 카드 게임을 선택하세요.</div>

  <div class="region-grid">
    {% for key, cfg in games.items %}
    <a href="{% url 'pricesite:expansion-list' key %}" class="region-card">
      <div class="region-label">{{ cfg.label }}</div>
    </a>
    {% endfor %}
  </div>
</main>
</body>
</html>
